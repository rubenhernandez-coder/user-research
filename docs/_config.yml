title: "User Research Project"
subtitle: "Study AI · Stage 1 — Discovery"
description: >-
  Structured user research with the ua-framework — the published record of
  a project moving from opportunity discovery through specification.

remote_theme: mmistakes/minimal-mistakes

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-sitemap

author:
  name: "Ruben Hernandez"
  email: "ruben.hernandez@students.jointheleague.org"

# Top navigation links (rendered in the masthead)
header_pages:
  - index.md

# Exclude files that should not become pages
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - "*.docx"

# Apply the 'single' layout to all pages by default and enable the TOC sidebar
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      toc: true
      toc_sticky: true
      author_profile: false

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
